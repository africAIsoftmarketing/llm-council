name: Build LLM Council Executable

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Récupérer le code ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Installer Python 3.10 (version du projet) ──────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Installer les dépendances backend ──────────────────────────────
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install fastapi "uvicorn[standard]" python-dotenv httpx pydantic

      # ── 4. Builder le frontend (Vite + React) ─────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── 5. Créer le fichier d'entrée run.py ───────────────────────────────
      # Nécessaire car backend/main.py utilise des imports relatifs (from . import ...)
      # qui ne fonctionnent pas directement avec PyInstaller
      - name: Create PyInstaller entry point
        shell: powershell
        run: |
          $content = @"
          import sys
          import os

          # Ajoute le dossier courant au path pour que 'backend' soit trouvable
          sys.path.insert(0, os.path.dirname(__file__))

          import uvicorn
          from backend.main import app

          if __name__ == "__main__":
              uvicorn.run(app, host="0.0.0.0", port=8001)
          "@
          Set-Content -Path "run.py" -Value $content

      # ── 6. Compiler l'exécutable avec PyInstaller ─────────────────────────
      - name: Build executable with PyInstaller
        run: |
          python -m PyInstaller `
            --onefile `
            --name "LLM-Council" `
            --add-data "frontend/dist;frontend/dist" `
            --add-data "backend;backend" `
            --hidden-import "backend.main" `
            --hidden-import "backend.storage" `
            --hidden-import "backend.council" `
            --hidden-import "backend.config" `
            --hidden-import "backend.openrouter" `
            --hidden-import "uvicorn.logging" `
            --hidden-import "uvicorn.loops" `
            --hidden-import "uvicorn.loops.auto" `
            --hidden-import "uvicorn.protocols" `
            --hidden-import "uvicorn.protocols.http" `
            --hidden-import "uvicorn.protocols.http.auto" `
            --hidden-import "uvicorn.lifespan" `
            --hidden-import "uvicorn.lifespan.on" `
            run.py

      # ── 7. Uploader l'artifact ────────────────────────────────────────────
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: LLM-Council-Windows
          path: dist\LLM-Council.exe
          retention-days: 30

  # ── Release automatique sur tag v* ────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: LLM-Council-Windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "LLM-Council.exe"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
