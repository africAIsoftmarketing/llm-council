name: Build LLM Council Executable

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Récupérer le code ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Installer Python 3.10 (version du projet) ──────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Installer les dépendances backend ──────────────────────────────
      # Le projet utilise pyproject.toml (pas requirements.txt)
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install fastapi "uvicorn[standard]" python-dotenv httpx pydantic

      # ── 4. Builder le frontend (Vite + React) ─────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        # Output dans frontend/dist/ (défaut Vite)

      # ── 5. Compiler l'exécutable avec PyInstaller ─────────────────────────
      # backend/main.py est le point d'entrée FastAPI (uvicorn)
      # On embarque le frontend/dist dans l'exe
      - name: Build executable with PyInstaller
        run: |
          python -m PyInstaller `
            --onefile `
            --name "LLM-Council" `
            --add-data "frontend/dist;frontend/dist" `
            --hidden-import "uvicorn.logging" `
            --hidden-import "uvicorn.loops" `
            --hidden-import "uvicorn.loops.auto" `
            --hidden-import "uvicorn.protocols" `
            --hidden-import "uvicorn.protocols.http" `
            --hidden-import "uvicorn.protocols.http.auto" `
            --hidden-import "uvicorn.lifespan" `
            --hidden-import "uvicorn.lifespan.on" `
            backend/main.py

      # ── 6. Uploader l'artifact ────────────────────────────────────────────
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: LLM-Council-Windows
          path: dist\LLM-Council.exe
          retention-days: 30

  # ── Release automatique sur tag v* ────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: LLM-Council-Windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "LLM-Council.exe"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
